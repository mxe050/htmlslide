<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SlideGen Pro - Edit Mode</title>
<!-- フォント -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Yusei+Magic&display=swap" rel="stylesheet">
<!-- ライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg-app: #f1f5f9;
    --c-primary: #0ea5e9;
    --c-text: #334155;
    --slide-bg: #ffffff;
    --font-main: 'Inter', 'Noto Sans JP', sans-serif;
    --slide-border: none;
    --slide-radius: 8px;
    --shadow-slide: 0 20px 40px rgba(0,0,0,0.15);
  }
  
  body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Inter', 'Noto Sans JP', sans-serif; background: var(--bg-app); color: #334155; overflow: hidden; transition: background 0.4s ease; }
  
  /* Header */
  .header { display: flex; justify-content: space-between; padding: 10px 24px; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.08); z-index: 100; align-items: center; }
  
  .main-area { display: flex; flex: 1; overflow: hidden; position: relative; }

  /* Input Panel */
  .input-panel { flex: 1; display: flex; flex-direction: column; padding: 30px; max-width: 1000px; margin: 0 auto; width: 100%; box-sizing: border-box; }
  .input-panel textarea { flex: 1; resize: none; margin-bottom: 0; font-family: monospace; padding: 20px; font-size: 16px; border: 1px solid #cbd5e1; border-radius: 12px; line-height: 1.7; transition: border-color 0.2s; }
  .input-panel textarea:focus { outline: none; border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2); }
  
  /* Preview Panel */
  .preview-panel { flex: 1; display: none; flex-direction: column; background: #0f172a; position: relative; overflow: hidden; }
  
  /* Slide Wrapper */
  .slide-container-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px 40px; box-sizing: border-box; overflow: hidden; position: relative; }
  
  .slide-container {
    --cw: 10px; /* Fallback */
    aspect-ratio: 16 / 9;
    background: var(--slide-bg);
    position: relative;
    box-shadow: var(--shadow-slide);
    overflow: hidden;
    border-radius: var(--slide-radius);
    border: var(--slide-border);
    max-width: 100%;
    max-height: 100%;
    transition: background 0.4s ease;
  }
  
  /* Speaker Note Components */
  /* 1. Bottom Fixed */
  .speaker-note-bottom {
    height: 25%; min-height: 150px; background: #1e293b; border-top: 1px solid #334155;
    display: none; flex-direction: column; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); z-index: 50;
  }
  .speaker-note-bottom.active { display: flex; }
  .speaker-note-header { padding: 8px 16px; background: #0f172a; color: #94a3b8; font-size: 13px; font-weight: bold; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
  .speaker-note-textarea {
    flex: 1; background: transparent; border: none; color: #f8fafc; padding: 15px 20px; font-size: 16px;
    line-height: 1.7; resize: none; font-family: 'Inter', 'Noto Sans JP', sans-serif;
  }
  .speaker-note-textarea:focus { outline: none; }

  /* 2. Hover Zone */
  .hover-note-zone { position: absolute; bottom: 0; left: 0; right: 0; height: calc(var(--cw) * 8); z-index: 20; display: flex; align-items: flex-end; }
  .hover-note-content { 
    width: 100%; background: rgba(0,0,0,0.85); color: #fff; padding: calc(var(--cw) * 2) calc(var(--cw) * 6);
    font-size: calc(var(--cw) * 1.8); opacity: 0; transition: opacity 0.3s, transform 0.3s; transform: translateY(10px);
    line-height: 1.6; box-sizing: border-box; pointer-events: none; border-top-left-radius: 8px; border-top-right-radius: 8px;
    display: none;
  }
  .hover-note-content.active { display: block; }
  .hover-note-zone:hover .hover-note-content { opacity: 1; transform: translateY(0); pointer-events: auto; }

  /* Slide Core Styles */
  .slide { position: absolute; inset: 0; padding: calc(var(--cw) * 8); display: none; flex-direction: column; justify-content: center; opacity: 0; transition: opacity 0.5s ease; font-family: var(--font-main); color: var(--c-text); box-sizing: border-box; }
  .slide.active { display: flex; opacity: 1; }
  .s-title { font-size: calc(var(--cw) * 5); font-weight: 900; margin-bottom: calc(var(--cw) * 4); color: var(--c-primary); line-height: 1.35; letter-spacing: 0.02em; }
  .s-content { font-size: calc(var(--cw) * 2.8); line-height: 1.8; list-style-position: outside; margin-left: calc(var(--cw) * 3); padding: 0; }
  .s-content li { margin-bottom: calc(var(--cw) * 1.5); }
  
  .slide.is-section { align-items: center; text-align: center; background: var(--c-primary); justify-content: center; }
  .slide.is-section .s-title { color: #fff; font-size: calc(var(--cw) * 6.5); margin: 0; text-shadow: 0 4px 15px rgba(0,0,0,0.2); }

  /* Interactive Navigation Overlays */
  .nav-left, .nav-right { position: absolute; top: 0; bottom: 0; width: 40%; z-index: 10; cursor: pointer; transition: background 0.3s; }
  .nav-left { left: 0; }
  .nav-right { right: 0; }
  .nav-left:hover { background: linear-gradient(to right, rgba(0,0,0,0.03), transparent); }
  .nav-right:hover { background: linear-gradient(to left, rgba(0,0,0,0.03), transparent); }

  /* Smart Agenda Sidebar */
  #agenda-trigger-zone { position: fixed; right: 0; top: 0; bottom: 0; width: 30px; z-index: 190; }
  .agenda-sidebar {
    position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
    box-shadow: -5px 0 25px rgba(0,0,0,0.1); z-index: 200; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; flex-direction: column; border-left: 1px solid rgba(0,0,0,0.05);
  }
  #agenda-trigger-zone:hover + .agenda-sidebar, .agenda-sidebar:hover { right: 0; }
  
  .agenda-header { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; font-size: 16px; font-weight: bold; color: var(--c-primary); }
  .agenda-list { overflow-y: auto; padding: 15px; list-style: none; margin: 0; flex: 1; }
  .agenda-list li { padding: 12px 15px; cursor: pointer; border-radius: 8px; font-size: 14px; margin-bottom: 6px; transition: all 0.2s; color: #475569; }
  .agenda-list li:hover { background: #f1f5f9; transform: translateX(4px); }
  .agenda-list li.current { background: var(--c-primary); color: #fff; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .agenda-list li.sec-item { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: bold; margin-top: 15px; padding-bottom: 4px; border-bottom: 1px solid #cbd5e1; border-radius: 0; cursor: default; background: none!important; color: #94a3b8!important; }

  /* AI Assistant Modal */
  .ai-modal { position: fixed; inset: 0; background: rgba(15,23,42,0.7); backdrop-filter: blur(6px); z-index: 300; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
  .ai-modal.show { display: flex; opacity: 1; }
  .ai-box { background: #fff; border-radius: 16px; width: 90%; max-width: 650px; padding: 35px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); transform: translateY(20px) scale(0.98); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); max-height: 90vh; overflow-y: auto;}
  .ai-modal.show .ai-box { transform: translateY(0) scale(1); }
  .ai-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 25px; border-radius: 12px; margin-bottom: 20px; transition: border-color 0.3s; }
  
  .ai-input-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  .ai-input-group input[type="text"], .ai-input-group select { flex: 1; min-width: 200px; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; outline: none; transition: all 0.2s; }
  .ai-input-group input[type="color"] { border: 1px solid #cbd5e1; border-radius: 8px; height: 42px; width: 60px; padding: 2px; cursor: pointer; }
  
  /* Buttons */
  button { cursor: pointer; padding: 10px 18px; border: 1px solid #e2e8f0; background: #fff; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s ease; color: #334155; }
  button:hover { background: #f8fafc; transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  button:active { transform: translateY(0); }
  button.primary { background: linear-gradient(135deg, var(--c-primary), #3b82f6); color: #fff; border: none; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
  button.primary:hover { filter: brightness(1.1); box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4); }
  button.ai-btn { background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; border: none; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
  button.ai-btn:hover { background: linear-gradient(135deg, #7c3aed, #4f46e5); box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4); }
  
  /* Fullscreen overrides (Applies ONLY to preview-panel now) */
  :fullscreen { background: #000; }
  :fullscreen .speaker-note-bottom { display: none!important; }
  :fullscreen .slide-container-wrapper { padding: 0; }
  :fullscreen .slide-container { border-radius: 0; border: none; }
  ::backdrop { background: #000; }
  
  /* Markdown Bold */
  strong { font-weight: 900; color: var(--c-primary); }
</style>
</head>
<body>

<!-- Header Toolbar -->
<div class="header" id="app-header">
  <div style="display:flex; align-items:center; gap: 20px;">
    <div style="font-weight:900; font-size: 1.5rem; letter-spacing: -0.03em; color: var(--c-primary);">SlideGen<span style="font-weight:400;color:#94a3b8;">Pro</span></div>
    <button class="ai-btn" onclick="openAIModal()">✨ テーマ・AI アシスト</button>
  </div>
  
  <div id="tb-input" style="display: flex; gap: 12px;">
    <button class="primary" onclick="generate()" style="padding: 10px 28px; font-size: 15px;">🚀 スライド生成</button>
  </div>
  
  <div id="tb-preview" style="display:none; gap: 10px; align-items:center;">
    <button onclick="toInput()">✏️ 編集に戻る</button>
    <div style="width: 1px; height: 24px; background: #e2e8f0; margin: 0 5px;"></div>
    <button onclick="toggleNoteMode()" id="btn-note-toggle">🗣️ 台本：固定表示</button>
    <div style="width: 1px; height: 24px; background: #e2e8f0; margin: 0 5px;"></div>
    <button onclick="downloadPDF()">📄 完全版PDF保存</button>
    <button onclick="toggleFullScreen()">🖥️ スライド全画面表示</button>
  </div>
</div>

<!-- Main Workspace -->
<div class="main-area">
  
  <!-- Editor Panel -->
  <div class="input-panel" id="input-panel">
    <div style="margin-bottom: 15px; font-weight: 600; color: #475569; display: flex; justify-content: space-between; align-items: flex-end;">
      <span>Markdown風 スライド原稿</span>
      <span style="font-size:12px; font-weight: normal; color: #94a3b8;">**テキスト** のようにアスタリスクで囲むと太字になります。</span>
    </div>
    <textarea id="source-text" placeholder="ここに原稿を入力してください。
「スライド: タイトル」でスライド分割。
「---セクション: タイトル---」で扉ページ。
「台本: 」以降に書いたテキストは発表者用ノートになります。"></textarea>
  </div>

  <!-- Presentation Panel -->
  <div class="preview-panel" id="preview-panel">
    
    <!-- Slide Area -->
    <div class="slide-container-wrapper" id="slide-wrapper">
      <div class="slide-container" id="slide-container">
        <!-- Slides are injected here -->
      </div>
    </div>
    
    <!-- Speaker Note Area (Bottom Fixed) -->
    <div class="speaker-note-bottom active" id="speaker-note-bottom">
      <div class="speaker-note-header">
        <span>🗣 発表者ノート（台本）</span>
        <span id="slide-counter-note">Slide 0 / 0</span>
      </div>
      <textarea class="speaker-note-textarea" id="bottom-note-content" readonly placeholder="このスライドには台本がありません。"></textarea>
    </div>

</div>

<!-- Smart Agenda Sidebar -->
<div id="agenda-trigger-zone"></div>
<div class="agenda-sidebar" id="agenda-sidebar">
  <div class="agenda-header">📑 アジェンダ</div>
  <ul class="agenda-list" id="agenda-list"></ul>
</div>

<!-- AI Assist / Settings Modal -->
<div class="ai-modal" id="ai-modal" onclick="if(event.target===this) closeAIModal()">
  <div class="ai-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
      <h3 style="margin:0; color:#0f172a; font-size: 20px;">✨ テーマ＆設定パネル</h3>
      <button onclick="closeAIModal()" style="border:none; background:transparent; font-size:24px; padding:0; color:#94a3b8;">&times;</button>
    </div>

    <!-- Design Section -->
    <div class="ai-card">
      <h4 style="margin-bottom:10px;">🎨 1. 見た目・デザインを変える</h4>
      <p style="margin-bottom:15px;">プロが作成したテーマを選ぶか、パレットから自由に色を調整できます。</p>
      
      <div class="ai-input-group" style="margin-bottom: 12px;">
        <select id="theme-select" onchange="applyBuiltinTheme(this.value)">
          <option value="modern" selected>モダンフラット（標準）</option>
          <option value="light">クリーンホワイト</option>
          <option value="dark">ナイトモード（黒背景）</option>
          <option value="medical">🩺 学術・医学大会風（明朝体・白背景）</option>
          <option value="manga">🗯️ コミック・漫画風（手書き風・太枠）</option>
          <option value="elegant">✨ エレガント（セピア・高級感）</option>
        </select>
      </div>

      <div style="font-size:13px; font-weight:bold; color:#475569; margin: 15px 0 5px;">詳細なカラーカスタマイズ</div>
      <div class="ai-input-group" style="background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; display:flex; gap: 15px;">
        <label style="display:flex; flex-direction:column; font-size:12px; gap:4px; align-items:center;">
          スライド背景
          <input type="color" id="val-bg" value="#ffffff">
        </label>
        <label style="display:flex; flex-direction:column; font-size:12px; gap:4px; align-items:center;">
          文字色
          <input type="color" id="val-txt" value="#334155">
        </label>
        <label style="display:flex; flex-direction:column; font-size:12px; gap:4px; align-items:center;">
          アクセント(強調)
          <input type="color" id="val-pri" value="#0ea5e9">
        </label>
        <button onclick="applyCustomPalette()" style="margin-top:auto;" class="ai-btn">選択した色を適用</button>
      </div>
    </div>

    <!-- Draft Gen Section -->
    <div class="ai-card">
      <h4 style="margin-bottom:10px;">✍️ 2. 原稿を自動生成</h4>
      <p style="margin-bottom:15px;">テーマを入力すると、構成と台本がすべて揃ったスライド一式を自動で作ります。</p>
      <div class="ai-input-group">
        <input type="text" id="auto-draft-input" placeholder="例：新AIツールの導入促進について">
        <button onclick="generateAutoDraft()" class="ai-btn" style="background: linear-gradient(135deg, #0ea5e9, #2563eb);">⚡️ ドラフト作成</button>
      </div>
    </div>
  </div>

<script>
// ==========================================
// 1. デザインテーマ・カラー機能
// ==========================================
const DESIGN_THEMES = {
  modern:  { bgApp: '#f1f5f9', p: '#0ea5e9', t: '#334155', sb: '#ffffff', f: "'Inter', 'Noto Sans JP', sans-serif", border: 'none', radius: '8px', shadow: '0 20px 40px rgba(0,0,0,0.15)' },
  light:   { bgApp: '#ffffff', p: '#10b981', t: '#1e293b', sb: '#ffffff', f: "'Inter', 'Noto Sans JP', sans-serif", border: '1px solid #e2e8f0', radius: '4px', shadow: '0 4px 6px rgba(0,0,0,0.05)' },
  dark:    { bgApp: '#020617', p: '#38bdf8', t: '#f8fafc', sb: '#0f172a', f: "'Inter', 'Noto Sans JP', sans-serif", border: '1px solid #1e293b', radius: '12px', shadow: '0 20px 50px rgba(0,0,0,0.5)' },
  medical: { bgApp: '#eef2f5', p: '#003366', t: '#1a1a1a', sb: '#ffffff', f: "'Noto Serif JP', serif", border: '1px solid #cbd5e1', radius: '0px', shadow: '0 5px 15px rgba(0,0,0,0.08)' },
  manga:   { bgApp: '#fcd34d', p: '#000000', t: '#000000', sb: '#ffffff', f: "'Yusei Magic', 'Comic Sans MS', sans-serif", border: '5px solid #000', radius: '0px', shadow: '10px 10px 0px rgba(0,0,0,1)' },
  elegant: { bgApp: '#292524', p: '#d4af37', t: '#fafaf9', sb: '#1c1917', f: "'Noto Serif JP', serif", border: '1px solid #78716c', radius: '2px', shadow: '0 20px 40px rgba(0,0,0,0.4)' }
};

function applyThemeTokens(bg, p, t, sb, f, border, radius, shadow) {
  const root = document.documentElement.style;
  root.setProperty('--bg-app', bg);
  root.setProperty('--c-primary', p);
  root.setProperty('--c-text', t);
  root.setProperty('--slide-bg', sb);
  if(f) root.setProperty('--font-main', f);
  if(border) root.setProperty('--slide-border', border);
  if(radius) root.setProperty('--slide-radius', radius);
  if(shadow) root.setProperty('--shadow-slide', shadow);
  
  document.getElementById('val-bg').value = sb;
  document.getElementById('val-txt').value = t;
  document.getElementById('val-pri').value = p;
}

function applyBuiltinTheme(themeId) {
  const t = DESIGN_THEMES[themeId] || DESIGN_THEMES.modern;
  applyThemeTokens(t.bgApp, t.p, t.t, t.sb, t.f, t.border, t.radius, t.shadow);
}

function applyCustomPalette() {
  const bg = document.getElementById('val-bg').value;
  const txt = document.getElementById('val-txt').value;
  const pri = document.getElementById('val-pri').value;
  // 背景はアプリ背景とスライド背景を同系統にする
  applyThemeTokens(bg, pri, txt, bg, null, '1px solid #ccc', '4px', '0 10px 20px rgba(0,0,0,0.1)');
  document.getElementById('theme-select').value = "";
}

// ==========================================
// 2. Parser Engine (with Markdown Bold support)
// ==========================================
// HTMLエスケープ＆太字置換 (例: **太字** -> <strong>太字</strong>)
function formatMarkdown(str) {
  const safe = str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return safe.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}

function parseText(text) {
  const lines = text.split('\n');
  const slides = [];
  let currentSlide = null;

  const pushSlide = () => { if (currentSlide) slides.push(currentSlide); };

  for (let line of lines) {
    line = line.trim();
    if (!line) continue;

    // セクション
    const secMatch = line.match(/^---\s*(?:セクション)?\s*[:：\-]?\s*(.+?)\s*---$/);
    if (secMatch) {
      pushSlide();
      currentSlide = { isSection: true, title: secMatch[1], bullets: [], notes: '' };
      continue;
    }

    // 新規スライド
    const slideMatch = line.match(/^[-・*\s]*(?:スライド|Slide|ページ|Page)\s*\d*\s*[:：\- ]\s*(.+)/i) || line.match(/^#+\s+(.+)/);
    if (slideMatch) {
      pushSlide();
      currentSlide = { isSection: false, title: slideMatch[1].trim(), bullets: [], notes: '', inNotes: false };
      continue;
    }

    // 台本領域
    const noteMatch = line.match(/^(?:台本|ノート|note|メモ)\s*[:：]\s*(.*)/i);
    if (noteMatch && currentSlide) {
      currentSlide.notes = noteMatch[1].trim();
      currentSlide.inNotes = true;
      continue;
    }

    if (!currentSlide) {
      currentSlide = { isSection: false, title: line, bullets: [], notes: '', inNotes: false };
      continue;
    }

    if (currentSlide.inNotes) {
      currentSlide.notes += (currentSlide.notes ? '\n' : '') + line;
    } else {
      const cleanLine = line.replace(/^[-・*]\s*/, '');
      currentSlide.bullets.push(cleanLine);
    }
  }
  pushSlide();
  return slides;
}

// ==========================================
// 3. UI 制御ロジック
// ==========================================
let currentSlides = [];
let currentIndex = 0;
let noteMode = 'fixed'; // 'fixed' (bottom panel) OR 'hover' (slide hover content)
let resizeObserver = null;

function generate() {
  const text = document.getElementById('source-text').value;
  if (!text.trim()) { alert('原稿を入力してください。'); return; }
  
  currentSlides = parseText(text);
  if (currentSlides.length === 0) return;

  currentIndex = 0;
  
  document.getElementById('input-panel').style.display = 'none';
  document.getElementById('preview-panel').style.display = 'flex';
  document.getElementById('tb-input').style.display = 'none';
  document.getElementById('tb-preview').style.display = 'flex';

  renderSlidesDOM();
  buildAgenda();

  // 文字消えバグ防止：サイズ確実計算
  const container = document.getElementById('slide-container');
  if(resizeObserver) resizeObserver.disconnect();
  
  // 初期値を即時計算
  const setCW = () => {
    const w = container.getBoundingClientRect().width;
    if(w > 0) container.style.setProperty('--cw', (w / 100) + 'px');
  };
  setCW();
  
  resizeObserver = new ResizeObserver(entries => {
    if(entries[0] && entries[0].contentRect.width > 0) {
      container.style.setProperty('--cw', (entries[0].contentRect.width / 100) + 'px');
    }
  });
  resizeObserver.observe(container);

  updateView();
}

function renderSlidesDOM() {
  const container = document.getElementById('slide-container');
  container.innerHTML = '';
  currentSlides.forEach((slide, idx) => {
    const div = document.createElement('div');
    div.className = 'slide' + (slide.isSection ? ' is-section' : '');
    div.id = 'slide-' + idx;
    
    let html = `<div class="s-title">${formatMarkdown(slide.title)}</div>`;
    if (!slide.isSection && slide.bullets.length > 0) {
      html += `<ul class="s-content">`;
      slide.bullets.forEach(b => { html += `<li>${formatMarkdown(b)}</li>`; });
      html += `</ul>`;
    }
    html += `<div class="nav-left" onclick="goPrev()"></div>`;
    html += `<div class="nav-right" onclick="goNext()"></div>`;
    
    // ホバー用ノートゾーン (固定の時は非表示になる仕組み)
    if (slide.notes) {
      html += `
        <div class="hover-note-zone" id="hover-note-${idx}">
          <div class="hover-note-content">${formatMarkdown(slide.notes).replace(/\n/g, '<br>')}</div>
        </div>
      `;
    }
    div.innerHTML = html;
    container.appendChild(div);
  });
}

function updateView() {
  const slides = document.querySelectorAll('.slide');
  slides.forEach((el, idx) => {
    if (idx === currentIndex) el.classList.add('active');
    else el.classList.remove('active');
    
    // ホバー表示の制御
    const hc = el.querySelector('.hover-note-content');
    if(hc) {
      if(noteMode === 'hover') hc.classList.add('active');
      else hc.classList.remove('active');
    }
  });

  // 下部固定ノートの制御
  document.getElementById('bottom-note-content').value = currentSlides[currentIndex].notes || '';
  document.getElementById('slide-counter-note').innerText = `Slide ${currentIndex + 1} / ${currentSlides.length}`;
  document.getElementById('speaker-note-bottom').classList.toggle('active', noteMode === 'fixed');

  // アジェンダ制御
  document.querySelectorAll('.agenda-list li').forEach(li => {
    li.classList.toggle('current', li.dataset.index == currentIndex);
  });
}

function toggleNoteMode() {
  noteMode = noteMode === 'fixed' ? 'hover' : 'fixed';
  document.getElementById('btn-note-toggle').innerText = noteMode === 'fixed' ? '🗣️ 台本：固定表示' : '💭 台本：マウスホバー表示';
  updateView();
  // リサイズ強制トリガー
  setTimeout(() => window.dispatchEvent(new Event('resize')), 50);
}

function toggleFullScreen() {
  // .preview-panel に対してフルスクリーンをかけるためメニューは消える
  const elem = document.getElementById('preview-panel');
  if (!document.fullscreenElement) {
    if (elem.requestFullscreen) elem.requestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
  }
}

function goPrev() { if (currentIndex > 0) { currentIndex--; updateView(); } }
function goNext() { if (currentIndex < currentSlides.length - 1) { currentIndex++; updateView(); } }

function buildAgenda() {
  const ul = document.getElementById('agenda-list');
  ul.innerHTML = '';
  currentSlides.forEach((slide, idx) => {
    const li = document.createElement('li');
    li.dataset.index = idx;
    if (slide.isSection) {
      li.className = 'sec-item';
      li.textContent = slide.title;
    } else {
      li.textContent = `${idx + 1}. ${slide.title}`;
    }
    li.onclick = () => { currentIndex = idx; updateView(); };
    ul.appendChild(li);
  });
}

function openAIModal() { document.getElementById('ai-modal').classList.add('show'); }
function closeAIModal() { document.getElementById('ai-modal').classList.remove('show'); }
function toInput() {

  document.getElementById('tb-input').style.display = 'flex';
  document.getElementById('tb-preview').style.display = 'none';
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  if (!jsPDF || typeof html2canvas === 'undefined') { alert('PDFライブラリ読み込み中...'); return; }
  const slides = document.querySelectorAll('.slide');
  if (slides.length === 0) return;

  const originalMode = noteMode;
  noteMode = 'hide'; updateView(); // 台本を消して撮影
  
  const W = 1920, H = 1080;
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'pt', format: [W, H] });

  // 強制的にSlideContainerのaspect-ratioを展開させる
  const container = document.getElementById('slide-container');
  const orgW = container.style.width; const orgH = container.style.height;
  container.style.width = '1920px'; container.style.height = '1080px';
  container.style.setProperty('--cw', '19.2px');
  
  for(let i=0; i < slides.length; i++) {
    const el = slides[i];
    slides.forEach(s => { s.classList.remove('active'); s.style.display = 'none'; s.style.opacity = 0; });
    el.classList.add('active'); el.style.display = 'flex'; el.style.opacity = 1;
    el.querySelectorAll('.nav-left, .nav-right').forEach(n => n.style.display = 'none');

    const canvas = await html2canvas(el, { scale: 1, backgroundColor: window.getComputedStyle(el).backgroundColor });
    if (i > 0) pdf.addPage([W, H], 'landscape');
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, W, H);
    
    el.querySelectorAll('.nav-left, .nav-right').forEach(n => n.style.display = 'block');
  }

  // 元に戻す
  container.style.width = orgW; container.style.height = orgH;
  noteMode = originalMode; currentIndex = 0; updateView();
  setTimeout(() => window.dispatchEvent(new Event('resize')), 50);
  
  pdf.save('SlideGenPro_Presentation.pdf');
}

document.addEventListener('keydown', e => {
  if (document.getElementById('preview-panel').style.display === 'flex') {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPrev();
  }
});

applyBuiltinTheme('modern');
